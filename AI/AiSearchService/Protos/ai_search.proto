syntax = "proto3";

option csharp_namespace = "Protos.AiSearch";

package ai_search;

service AiSearchService {
  rpc Search (SearchRequest) returns (SearchResponse);
  rpc SearchStream (stream StreamSearchRequest) returns (stream StreamSearchResponse);
}

message SearchRequest {
  string query = 1;
  int32 page = 2;
  int32 page_size = 3;
  bool debug = 4;
}

message SearchResponse {
  repeated SearchResultItem items = 1;
  int32 total_count = 2;
  string parsed_query_debug = 3;
  bool used_ai = 4;
}

message SearchResultItem {
  string product_id = 1;
  string name = 2;
  string category = 3;
  string price = 4;
  string currency = 5;
  double relevance_score = 6;
  repeated string image_urls = 7;
}

enum SearchPhase {
  SEARCH_PHASE_KEYWORD = 0;
  SEARCH_PHASE_MERGED = 1;
}

message StreamSearchRequest {
  string request_id = 1;
  string query = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message StreamSearchResponse {
  string request_id = 1;
  SearchPhase phase = 2;
  repeated SearchResultItem items = 3;
  int32 total_count = 4;
  bool used_ai = 5;
}