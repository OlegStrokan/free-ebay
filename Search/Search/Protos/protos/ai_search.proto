syntax = "proto3";

option csharp_namespace = "Protos.AiSearch";

package ai_search;

service AiSearchService {
  rpc Search(AiSearchRequest) returns (AiSearchResponse);
  rpc SearchStream(stream AiStreamSearchRequest) returns (stream AiStreamSearchResponse);
  rpc GetSimilarItems(AiGetSimilarItemsRequest) returns (AiGetSimilarItemsResponse);
  rpc GetFrequentlyBoughtTogether(AiGetFrequentlyBoughtTogetherRequest) returns (AiGetFrequentlyBoughtTogetherResponse);
}

message AiSearchRequest {
  string query = 1;
  int32 page = 2;
  int32 page_size = 3;
  bool debug = 4;
  string user_id = 5;
}

message AiSearchResponse {
  repeated AiSearchResultItem items = 1;
  int32 total_count = 2;
  string parsed_query_debug = 3;
  bool used_ai = 4;
}

message AiSearchResultItem {
  string product_id = 1;
  string name = 2;
  string category = 3;
  double price = 4;
  string currency = 5;
  double relevance_score = 6;
  repeated string image_urls = 7;
}

enum AiSearchPhase {
  SEARCH_PHASE_KEYWORD = 0;
  SEARCH_PHASE_MERGED = 1;
}

message AiStreamSearchRequest {
  string request_id = 1;
  string query = 2;
  int32 page = 3;
  int32 page_size = 4;
  string user_id = 5;
}

message AiStreamSearchResponse {
  string request_id = 1;
  AiSearchPhase phase = 2;
  repeated AiSearchResultItem items = 3;
  int32 total_count = 4;
  bool used_ai = 5;
}

message AiGetSimilarItemsRequest {
  string catalog_item_id = 1;
  int32 limit = 2;
  string category = 3;
  string condition = 4;
}

message AiSimilarItem {
  string catalog_item_id = 1;
  double score = 2;
}

message AiGetSimilarItemsResponse {
  repeated AiSimilarItem items = 1;
}

message AiGetFrequentlyBoughtTogetherRequest {
  string catalog_item_id = 1;
  int32 limit = 2;
}

message AiCoOccurrenceItem {
  string catalog_item_id = 1;
  double score = 2;
}

message AiGetFrequentlyBoughtTogetherResponse {
  repeated AiCoOccurrenceItem items = 1;
}