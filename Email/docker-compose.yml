# Run shared infra first:  docker compose -f ../docker-compose.infra.yml up -d
name: email-service-deps

networks:
  free-ebay-local:
    external: true

volumes:
  email_postgres_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: email-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_service
    ports:
      - "5440:5432"
    volumes:
      - email_postgres_data:/var/lib/postgresql/data
    networks:
      - free-ebay-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d email_service"]
      interval: 5s
      timeout: 5s
      retries: 10

