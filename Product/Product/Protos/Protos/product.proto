syntax = "proto3";

import "common.proto";

option csharp_namespace = "Protos.Product";

package product;

service ProductService {
  rpc GetProductPrices (GetProductPricesRequest) returns (GetProductPricesResponse);
  rpc GetProducts(GetProductsRequest) returns(GetProductsResponse);
  rpc GetProduct(GetProductRequest) returns(GetProductResponse);

  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
  rpc ActivateProduct(ActivateProductRequest) returns (ActivateProductResponse);
  rpc DeactivateProduct(DeactivateProductRequest) returns (DeactivateProductResponse);
  rpc UpdateProductStock(UpdateProductStockRequest) returns (UpdateProductStockResponse);
}

//------------------get-product-prices---------------------//

message GetProductPricesRequest {
  repeated string product_ids = 1;
}

message GetProductPricesResponse {
  repeated ProductPrice prices = 1;
  repeated string not_found_ids = 2;
}

//-------------------get-products-----------------//

message GetProductsRequest {
  repeated string product_ids = 1;
}

message GetProductsResponse {
  repeated ProductDetail products = 1;
  repeated string not_found_ids = 2;
}

//-------------------get-product-----------------//

message GetProductRequest {
   string product_id = 1;
}

message GetProductResponse {
  ProductDetail product = 2;
}

//-----------------items---------------------------//
message ProductPrice {
  string product_id = 1;
  common.DecimalValue price = 2;
  string currency   = 3;
}

message ProductDetail {
  string product_id   = 1;
  string name         = 2;
  string description  = 3;
  string category_id  = 4;   // UUID - authoritative domain reference
  string category_name = 5;  // resolved by Application layer for display; not stored in domain
  common.DecimalValue price  = 6;
  string currency     = 7;
  int32  stock        = 8;
  repeated ProductAttributeProto attributes = 9;
  repeated string image_urls = 10;
}

message ProductAttributeProto {
  string key = 1;
  string value = 2;
}

//-----------------write requests--------------------------//

message CreateProductRequest {
  string seller_id    = 1;
  string name         = 2;
  string description  = 3;
  string category_id  = 4;
  common.DecimalValue price = 5;
  string currency     = 6;
  int32  initial_stock = 7;
  repeated ProductAttributeProto attributes = 8;
  repeated string image_urls = 9;
}

message CreateProductResponse {
  string product_id = 1;
}

message UpdateProductRequest {
  string product_id   = 1;
  string name         = 2;
  string description  = 3;
  string category_id  = 4;
  common.DecimalValue price = 5;
  string currency     = 6;
  repeated ProductAttributeProto attributes = 7;
  repeated string image_urls = 8;
}

message UpdateProductResponse {}

message DeleteProductRequest {
  string product_id = 1;
}

message DeleteProductResponse {}

message ActivateProductRequest {
  string product_id = 1;
}

message ActivateProductResponse {}

message DeactivateProductRequest {
  string product_id = 1;
}

message DeactivateProductResponse {}

message UpdateProductStockRequest {
  string product_id    = 1;
  int32  new_quantity  = 2;
}

message UpdateProductStockResponse {}