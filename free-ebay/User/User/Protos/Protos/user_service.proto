syntax = "proto3";

option csharp_namespace = "Protos.User";


import "user.proto";
import "role_service.proto";

message GetUserByIdRequest {
  string id = 1;
}

message GetUserByIdResponse {
  UserProto data = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByEmailResponse {
  optional UserProto data = 1;
}

message VerifyCredentialsRequest {
  string email = 1;
  string password = 2;
}

message VerifyCredentialsResponse {
  optional UserProto data = 1;
  bool is_valid = 2;
}

message VerifyUserEmailRequest {
  string user_id = 1;
}

message VerifyUserEmailResponse {
  bool success = 1;
}

message UpdateUserPasswordRequest {
  string user_id = 1;
  string new_password_hash = 2;
}

message UpdateUserPasswordResponse {
  bool success = 1;
  string message = 2;
}

message BlockUserRequest {
  string target_user_id = 1;
  string actor_user_id = 2;
  string reason = 3;
}

message BlockUserResponse {
  UserProto data = 1;
}

message UpdatePasswordRequest {
  string id = 1;
  string current_password = 2;
  string new_password = 3;
}

message UpdatePasswordResponse {}

message CreateUserRequest {
  string full_name = 1;
  string password = 2;
  string email = 3;
  string phone = 4;
  string country_code = 5;
  CustomerTierProto customer_tier = 6;
}

message CreateUserResponse {
  optional UserProto data = 1;
}

message UpdateUserRequest {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string phone = 4;
  string country_code = 5;
  CustomerTierProto customer_tier = 6;
}

message UpdateUserResponse {
  UserProto data = 1;
}

message DeleteUserRequest {
  string id = 1;
}
message DeleteUserResponse {}

service UserServiceProto {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc GetUserById(GetUserByIdRequest) returns (GetUserByIdResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc BlockUser(BlockUserRequest) returns (BlockUserResponse);
  rpc UpdatePassword(UpdatePasswordRequest) returns (UpdatePasswordResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
  rpc VerifyUserEmail(VerifyUserEmailRequest) returns (VerifyUserEmailResponse);
  rpc UpdateUserPassword(UpdateUserPasswordRequest) returns (UpdateUserPasswordResponse);
  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);
  rpc GetAllRoles(GetAllRolesRequest) returns (GetAllRolesResponse);
}