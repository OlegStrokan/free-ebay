syntax = "proto3";

import "common.proto";

option csharp_namespace = "Protos.Payment";

package payment;

service PaymentService {
  rpc ProcessPayment (ProcessPaymentRequest) returns (ProcessPaymentResponse);
  rpc RefundPayment (RefundPaymentRequest) returns (RefundPaymentResponse);
}

enum ProcessPaymentStatus {
  PROCESS_PAYMENT_STATUS_UNSPECIFIED = 0;
  PROCESS_PAYMENT_STATUS_SUCCEEDED = 1;
  PROCESS_PAYMENT_STATUS_PENDING = 2;
  PROCESS_PAYMENT_STATUS_FAILED = 3;
  PROCESS_PAYMENT_STATUS_REQUIRES_ACTION = 4;
}

message ProcessPaymentRequest {
  string order_id = 1;
  string customer_id = 2;
  common.DecimalValue amount = 3;
  string currency = 4;
  string payment_method = 5;
}

message ProcessPaymentResponse {
  bool success = 1;
  string payment_id = 2;
  string error_code = 3;
  string error_message = 4;
  ProcessPaymentStatus status = 5;
  string provider_payment_intent_id = 6;
  string client_secret = 7;
}

message RefundPaymentRequest {
  string payment_id = 1;
  common.DecimalValue amount = 2;
  string reason = 3;
}

message RefundPaymentResponse {
  bool success = 1;
  string refund_id = 2;
  string error_message = 3;
}