name: Order Service Pipeline

on:
  push:
    branches: [main, dev]
    paths:
      - "Order/**"
      - ".github/workflows/order-pipeline.yml"
  pull_request:
    paths:
      - "Order/**"
      - ".github/workflows/order-pipeline.yml"

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: Order/Order.sln
  BUILD_CONFIG: Release

# stage 1: build
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c ${{ env.BUILD_CONFIG }} /property:GenerateFullPaths=true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          # upload the entire Order directory so every project's bin/ is available
          path: Order/
          retention-days: 1

# stage 2: unit tests
  test-unit:
    name: Unit Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false      # keep running other projects even if one fails
      matrix:
        project:
          - Domain.Tests
          - Application.Tests
          - Api.Tests
          - Infrastructure.Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: Order/

      - name: Run ${{ matrix.project }}
        run: |
          dotnet test Order/Order.UnitTests/${{ matrix.project }} \
            --no-build \
            -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=${{ matrix.project }}.trx" \
            --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit – ${{ matrix.project }}
          path: ./test-results/${{ matrix.project }}.trx
          reporter: dotnet-trx

# stage 3: integration tests
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    # Docker is available on ubuntu-latest - Testcontainers manages PostgreSQL itself

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: Order/

      - name: Run integration tests
        run: |
          dotnet test Order/Order.IntegrationTests \
            --no-build \
            -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeTestCollections=false
        env:
          # Testcontainers pulls images from Docker Hub - increase timeout for slow runners
          TESTCONTAINERS_RYUK_DISABLED: "false"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: ./test-results/integration.trx
          reporter: dotnet-trx

# stage 4: e2e tests
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test-integration
    # Testcontainers.Kafka + Testcontainers.PostgreSql - Docker handles everything

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: Order/

      - name: Run E2E tests
        run: |
          dotnet test Order/Order.E2ETests \
            --no-build \
            -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=e2e.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeTestCollections=false
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"
        timeout-minutes: 15

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests
          path: ./test-results/e2e.trx
          reporter: dotnet-trx
