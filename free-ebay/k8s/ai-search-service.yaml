apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-search-service
  namespace: free-ebay
  labels:
    app: ai-search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-search-service
  template:
    metadata:
      labels:
        app: ai-search-service
    spec:
      containers:
        - name: ai-search-service
          image: free-ebay/ai-search-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8003
              name: http
          env:
            - name: AI_SEARCH_EMBEDDING_SERVICE_URL
              value: http://embedding-service:8001
            - name: AI_SEARCH_OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: AI_SEARCH_LLM_MODEL
              value: phi3:mini
            - name: AI_SEARCH_QDRANT_URL
              value: http://qdrant:6333
            - name: AI_SEARCH_QDRANT_COLLECTION
              value: products
            - name: AI_SEARCH_ES_URL
              value: http://elasticsearch:9200
            - name: AI_SEARCH_ES_INDEX
              value: products
            - name: AI_SEARCH_GRPC_PORT
              value: "50051"
            - name: AI_SEARCH_HTTP_PORT
              value: "8003"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-search-service
  namespace: free-ebay
spec:
  selector:
    app: ai-search-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http
      port: 8003
      targetPort: 8003
  type: ClusterIP