apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-service
  namespace: free-ebay
  labels:
    app: email-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-service
  template:
    metadata:
      labels:
        app: email-service
    spec:
      containers:
        - name: email-service
          image: free-ebay/email-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: grpc
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Kestrel__EndpointDefaults__Protocols
              value: Http2
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: email-service-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: email-service
  namespace: free-ebay
spec:
  selector:
    app: email-service
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
  type: ClusterIP