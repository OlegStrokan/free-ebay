# ── PostgreSQL Read Instance (read model DB — scales independently)
# Separate Postgres instance for OrderReadModels / ReturnRequestReadModels.
# KafkaReadModelSynchronizer writes here; all query handlers read from here.
# Can be scaled vertically (bigger instance) or replaced with a read replica
# of postgres-write via streaming replication later.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-read
  namespace: free-ebay
spec:
  serviceName: postgres-read
  replicas: 1
  selector:
    matchLabels:
      app: postgres-read
  template:
    metadata:
      labels:
        app: postgres-read
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-read-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            # Read model is query-heavy — prioritise memory for shared_buffers
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "2"
              memory: "4Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "order_read"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "order_read"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-read
  namespace: free-ebay
spec:
  selector:
    app: postgres-read
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
