apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: free-ebay
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: free-ebay/embedding-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: EMBEDDING_OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: EMBEDDING_DEFAULT_MODEL
              value: nomic-embed-text
            - name: EMBEDDING_PORT
              value: "8001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: free-ebay
spec:
  selector:
    app: embedding-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP