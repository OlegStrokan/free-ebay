apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: free-ebay
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: free-ebay/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: grpc
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Kestrel__EndpointDefaults__Protocols
              value: Http2
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: payment-service-secret
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "750m"
              memory: "768Mi"
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: free-ebay
spec:
  selector:
    app: payment-service
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
  type: ClusterIP