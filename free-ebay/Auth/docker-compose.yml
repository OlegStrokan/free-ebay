# Run shared infra first:  docker compose -f ../docker-compose.infra.yml up -d
name: auth-service-deps

networks:
  free-ebay-local:
    external: true

volumes:
  auth_postgres_data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - free-ebay-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 10

