syntax = "proto3";

option csharp_namespace = "Protos.User";

package user;

message UserProto {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string phone = 4;
  UserStatusProto status = 7;
  int64 createdAt = 8;
  int64 updatedAt = 9;
  string country_code = 10;
  CustomerTierProto customer_tier = 11;
}

enum UserStatusProto {
  ACTIVE = 0;
  BLOCKED = 1;
}

enum CustomerTierProto {
  STANDARD = 0;
  SUBSCRIBER = 1;
  PREMIUM = 2;
}
