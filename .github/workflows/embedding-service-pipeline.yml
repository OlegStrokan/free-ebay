name: Embedding Service Pipeline

on:
  push:
    branches: [main]
    paths:
      - "AI/EmbeddingService/**"
      - ".github/workflows/embedding-service-pipeline.yml"
  pull_request:
    paths:
      - "AI/EmbeddingService/**"
      - ".github/workflows/embedding-service-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: embedding-service

jobs:
  build:
    name: Build (sync deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('AI/EmbeddingService/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Sync dependencies
        working-directory: AI/EmbeddingService
        run: uv sync --frozen

  test:
    name: ${{ matrix.tier }} Tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        tier: [unit, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('AI/EmbeddingService/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Sync dependencies
        working-directory: AI/EmbeddingService
        run: uv sync --frozen
      - name: Run ${{ matrix.tier }} tests
        working-directory: AI/EmbeddingService
        run: uv run pytest tests/${{ matrix.tier }} --junitxml=../../test-results/embedding-${{ matrix.tier }}.xml -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: embedding-${{ matrix.tier }}-results
          path: test-results/embedding-${{ matrix.tier }}.xml
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Embedding ${{ matrix.tier }}
          path: test-results/embedding-${{ matrix.tier }}.xml
          reporter: java-junit

  docker-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: ./AI/EmbeddingService
          file: ./AI/EmbeddingService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
