name: AI Search Service Pipeline

on:
  push:
    branches: [main]
    paths:
      - "AI/AiSearchService/**"
      - ".github/workflows/ai-search-service-pipeline.yml"
  pull_request:
    paths:
      - "AI/AiSearchService/**"
      - ".github/workflows/ai-search-service-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  SERVICE_DIR: AI/AiSearchService

jobs:
  build:
    name: Build (sync deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('AI/AiSearchService/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Sync dependencies
        working-directory: AI/AiSearchService
        run: uv sync --frozen

  test:
    name: ${{ matrix.tier }} Tests
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        tier: [unit, integration, contract, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('AI/AiSearchService/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Sync dependencies
        working-directory: AI/AiSearchService
        run: uv sync --frozen
      - name: Run ${{ matrix.tier }} tests
        working-directory: AI/AiSearchService
        run: uv run pytest tests/${{ matrix.tier }} --junitxml=../../test-results/ai-search-${{ matrix.tier }}.xml -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-search-${{ matrix.tier }}-results
          path: test-results/ai-search-${{ matrix.tier }}.xml
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: AI Search ${{ matrix.tier }}
          path: test-results/ai-search-${{ matrix.tier }}.xml
          reporter: java-junit
