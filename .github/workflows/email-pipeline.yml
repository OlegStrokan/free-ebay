name: Email Service Pipeline

on:
  push:
    branches: [main]
    paths:
      - "Email/**"
      - ".github/workflows/email-pipeline.yml"
  pull_request:
    paths:
      - "Email/**"
      - ".github/workflows/email-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: Email/Email.sln
  BUILD_CONFIG: Release

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Email/**/packages.lock.json', 'Email/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore ${{ env.SOLUTION }}
      - run: dotnet build ${{ env.SOLUTION }} --no-restore -c ${{ env.BUILD_CONFIG }} /property:GenerateFullPaths=true
      - uses: actions/upload-artifact@v4
        with:
          name: email-build-output
          path: Email/
          retention-days: 1

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Email/**/packages.lock.json', 'Email/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: email-build-output
          path: Email/
      - run: |
          dotnet test Email/Email.Tests \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=unit.trx" \
            --results-directory ./test-results
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Email Unit
          path: ./test-results/unit.trx
          reporter: dotnet-trx

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Email/**/packages.lock.json', 'Email/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: email-build-output
          path: Email/
      - run: |
          dotnet test Email/Email.IntegrationTests \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeTestCollections=false
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Email Integration
          path: ./test-results/integration.trx
          reporter: dotnet-trx
