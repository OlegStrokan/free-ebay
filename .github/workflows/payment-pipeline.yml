name: Payment Service Pipeline

on:
  push:
    branches: [main]
    paths:
      - "Payment/**"
      - ".github/workflows/payment-pipeline.yml"
  pull_request:
    paths:
      - "Payment/**"
      - ".github/workflows/payment-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  SERVICE_DIR: Payment
  SOLUTION: Payment/Payment.sln
  BUILD_CONFIG: Release

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Payment/**/packages.lock.json', 'Payment/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore ${{ env.SOLUTION }}
      - run: dotnet build ${{ env.SOLUTION }} --no-restore -c ${{ env.BUILD_CONFIG }} /property:GenerateFullPaths=true
      - uses: actions/upload-artifact@v4
        with:
          name: payment-build-output
          path: Payment/
          retention-days: 1

  test-unit:
    name: Unit (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        project: [Domain.Tests, Application.Tests, Api.Tests, Infrastructure.Tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Payment/**/packages.lock.json', 'Payment/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: payment-build-output
          path: Payment/
      - run: |
          dotnet test Payment/Payment.UnitTests/${{ matrix.project }} \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=${{ matrix.project }}.trx" \
            --results-directory ./test-results
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Payment Unit – ${{ matrix.project }}
          path: ./test-results/${{ matrix.project }}.trx
          reporter: dotnet-trx

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Payment/**/packages.lock.json', 'Payment/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: payment-build-output
          path: Payment/
      - run: |
          dotnet test Payment/Payment.IntegrationTests \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeTestCollections=false
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Payment Integration
          path: ./test-results/integration.trx
          reporter: dotnet-trx

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test-integration
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Payment/**/packages.lock.json', 'Payment/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: payment-build-output
          path: Payment/
      - run: |
          dotnet test Payment/Payment.E2ETests \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=e2e.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeTestCollections=false
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Payment E2E
          path: ./test-results/e2e.trx
          reporter: dotnet-trx
