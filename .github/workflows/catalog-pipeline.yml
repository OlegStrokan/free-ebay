name: Catalog Service Pipeline

on:
  push:
    branches: [main]
    paths:
      - "Catalog/**"
      - ".github/workflows/catalog-pipeline.yml"
  pull_request:
    paths:
      - "Catalog/**"
      - ".github/workflows/catalog-pipeline.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: Catalog/Catalog.sln
  BUILD_CONFIG: Release

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Catalog/**/packages.lock.json', 'Catalog/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - run: dotnet restore ${{ env.SOLUTION }}
      - run: dotnet build ${{ env.SOLUTION }} --no-restore -c ${{ env.BUILD_CONFIG }} /property:GenerateFullPaths=true
      - uses: actions/upload-artifact@v4
        with:
          name: catalog-build-output
          path: Catalog/
          retention-days: 1

  test-unit:
    name: Unit (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        project: [Application.Tests, Infrastructure.Tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Catalog/**/packages.lock.json', 'Catalog/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: catalog-build-output
          path: Catalog/
      - run: |
          dotnet test Catalog/Catalog.UnitTests/${{ matrix.project }} \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=${{ matrix.project }}.trx" \
            --results-directory ./test-results
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Catalog Unit – ${{ matrix.project }}
          path: ./test-results/${{ matrix.project }}.trx
          reporter: dotnet-trx

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Catalog/**/packages.lock.json', 'Catalog/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/download-artifact@v4
        with:
          name: catalog-build-output
          path: Catalog/
      - run: |
          dotnet test Catalog/Catalog.IntegrationTests \
            --no-build -c ${{ env.BUILD_CONFIG }} \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeTestCollections=false
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Catalog Integration
          path: ./test-results/integration.trx
          reporter: dotnet-trx
