# Replace all values with base64-encoded real secrets before deploying.
# Generate:  echo -n "my-password" | base64
# Never commit real secrets to version control - use Vault, Sealed Secrets, or
# external-secrets-operator in production.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-write-secret
  namespace: free-ebay
type: Opaque
data:
  # echo -n "order_write_pass" | base64
  POSTGRES_PASSWORD: b3JkZXJfd3JpdGVfcGFzcw==
  POSTGRES_USER:     b3JkZXI=
  POSTGRES_DB:       b3JkZXI=
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-read-secret
  namespace: free-ebay
type: Opaque
data:
  # echo -n "order_read_pass" | base64
  POSTGRES_PASSWORD: b3JkZXJfcmVhZF9wYXNz
  POSTGRES_USER:     b3JkZXJfcmVhZA==
  POSTGRES_DB:       b3JkZXJfcmVhZA==
---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secret
  namespace: free-ebay
type: Opaque
data:
  # ConnectionStrings__Write  - points to postgres-write
  # ConnectionStrings__Read   - points to postgres-read (replica / separate DB)
  ConnectionStrings__Write: "REPLACE_ME_BASE64"
  ConnectionStrings__Read:  "REPLACE_ME_BASE64"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: free-ebay
type: Opaque
data:
  ConnectionStrings__Default: "REPLACE_ME_BASE64"
  Jwt__Secret:                "REPLACE_ME_BASE64"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: free-ebay
type: Opaque
data:
  ConnectionStrings__Default: "REPLACE_ME_BASE64"
