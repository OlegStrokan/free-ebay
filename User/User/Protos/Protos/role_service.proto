syntax = "proto3";

option csharp_namespace = "Protos.Role";


import "role.proto";


message GetAllRolesRequest {}
message GetAllRolesResponse { repeated RoleProto roles = 1; }

message AssignRoleRequest {
    string user_id = 1;
    string role_name = 2;
    string assigned_by = 3;
}
message AssignRoleResponse { bool success = 1; }

message RevokeRoleRequest {
    string user_id = 1;
    string role_name = 2;
}
message RevokeRoleResponse { bool success = 1; }

message GetUserRolesRequest  { string user_id = 1; }
message GetUserRolesResponse { repeated RoleProto roles = 1; }