syntax = "proto3";

option csharp_namespace = "Protos.User";


message UserProto {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string phone = 4;
  repeated string roles = 5;
  repeated DeliveryInfoProto delivery_info = 6;
  UserStatusProto status = 7;
  int64 createdAt = 8;
  int64 updatedAt = 9;
  string country_code = 10;
  CustomerTierProto customer_tier = 11;
  bool is_email_verified = 12;
}

message DeliveryInfoProto {
  string id = 1;
  string street = 2;
  string city = 3;
  string postal_code = 4;
  string country_destination = 5;
}

enum UserStatusProto {
  ACTIVE = 0;
  RESTRICTED = 1;
  BANNED = 2;
}

enum CustomerTierProto {
  STANDARD = 0;
  SUBSCRIBER = 1;
  PREMIUM = 2;
}